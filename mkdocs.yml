site_name: inferscale
site_url: https://github.com/mbaddar1/InferScale
theme:
  name: readthedocs

nav:
  - Home: index.md
  - API: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options :
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_source: false

markdown_extensions:
  - admonition
  - toc:
      permalink: true